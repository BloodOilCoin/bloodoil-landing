<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloodOil</title>

<style>

body{
margin:0;
overflow:hidden;
}

/* Fonas */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

/* SVARBIAUSIA DALIS */
background-image:url('./bloodoil-bg.jpg');

background-size:cover;
background-position:center;
background-repeat:no-repeat;

/* animacija */
animation:zoom 25s infinite alternate ease-in-out;
}

/* judėjimas */

@keyframes zoom{
0%{
transform:scale(1);
}
100%{
transform:scale(1.1);
}
}

</style>

</head>

<body>

<div class="background"></div>

</body>
</html>
