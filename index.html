<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BloodOil</title>

<style>

body{
margin:0;
}

/* Fonas */

.background{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:url("bloodoil-bg.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

/* animacija */
animation:zoom 20s infinite alternate;
}

/* judėjimas */

@keyframes zoom{
0%{
transform:scale(1);
}
100%{
transform:scale(1.08);
}
}

</style>

</head>

<body>

<div class="background"></div>

</body>
</html>
