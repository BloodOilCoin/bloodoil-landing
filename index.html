<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BloodOil</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
}

/* Nuotrauka */

.background{
position:fixed;
width:100%;
height:100%;
background:url("oil.jpg");
background-size:cover;
background-position:center;
animation:zoom 30s infinite alternate;
}

/* Blood red overlay */

.overlay{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(
rgba(120,0,0,0.6),
rgba(0,0,0,0.9)
);
}

/* zoom animacija */

@keyframes zoom{
0%{
transform:scale(1);
}
100%{
transform:scale(1.15);
}
}

</style>

</head>

<body>

<div class="background"></div>
<div class="overlay"></div>

</body>
</html>
